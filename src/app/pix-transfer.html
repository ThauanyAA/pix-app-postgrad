@if (!confirmado()) {
  <div class="transfer-card">
    <div class="card-header">
      <div class="header-icon">💸</div>
      <div class="header-info">
        <h2 class="card-title">Área Pix</h2>
        <p class="card-subtitle">Faça transferências e agendamentos instantâneos</p>
      </div>
    </div>

    <form (ngSubmit)="confirmar()" class="transfer-form" #form="ngForm">
      <div class="form-group">
        <label for="chavePix" class="form-label">Chave Pix (CPF/CNPJ, Email, Celular ou Chave Aleatória)</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input
            type="text"
            id="chavePix"
            name="chavePix"
            class="form-input"
            [(ngModel)]="chavePix"
            placeholder="Insira a chave do recebedor"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="valor" class="form-label">Valor (R$)</label>
          <div class="input-wrapper">
            <span class="input-icon">💲</span>
            <input
              type="number"
              id="valor"
              name="valor"
              class="form-input"
              [(ngModel)]="valor"
              placeholder="0,00"
              min="0.01"
              step="0.01"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="dataAgendamento" class="form-label">Data de Pagamento</label>
          <div class="input-wrapper">
            <span class="input-icon">📅</span>
            <input
              type="date"
              id="dataAgendamento"
              name="dataAgendamento"
              class="form-input"
              [(ngModel)]="dataAgendamento"
              required
            />
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!form.valid">
        <span>Confirmar Transferência</span>
        <span class="btn-arrow">→</span>
      </button>
    </form>

    @if (showError()) {
      <app-error-modal
        [title]="errorTitle()"
        [message]="errorMessage()"
        (close)="showError.set(false)"
      />
    }
  </div>
} @else {
  <app-pix-receipt
    [valor]="valor()"
    [nome]="chavePix()"
    [dataAgendamento]="dataAgendamento()"
    (close)="confirmado.set(false)"
    (novaTransferencia)="confirmado.set(false); chavePix.set(''); valor.set(null);"
  />
}
